version: 2
updates:
  # Backend dependencies (root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      backend-dependencies:
        update-types:
          - "minor"
          - "patch"

  # Frontend dependencies (client)
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      frontend-dependencies:
        update-types:
          - "minor"
          - "patch"
